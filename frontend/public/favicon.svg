<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="#0d0d0d"/>

  <!-- Explosion leader lines -->
  <line x1="16" y1="9" x2="16" y2="11" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="23" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="9"  y1="16" x2="11" y2="16" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>
  <line x1="21" y1="16" x2="23" y2="16" stroke="#d4a843" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Satellite components (offset, reduced opacity) -->
  <rect x="12" y="2"  width="8" height="6" rx="1" fill="#d4a843" fill-opacity="0.6"/>
  <rect x="12" y="24" width="8" height="6" rx="1" fill="#d4a843" fill-opacity="0.6"/>
  <rect x="2"  y="12" width="6" height="8" rx="1" fill="#d4a843" fill-opacity="0.6"/>
  <rect x="24" y="12" width="6" height="8" rx="1" fill="#d4a843" fill-opacity="0.6"/>

  <!-- Core assembly body -->
  <rect x="11" y="11" width="10" height="10" rx="1.5" fill="#d4a843"/>
</svg>
